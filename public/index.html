<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEAD SIGNAL :: SQL Case Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>

    <main class="layout">
      <aside class="panel panel--left">
        <h1 class="logo">DEAD SIGNAL</h1>
        <p class="tagline">NEXUS leak forensic console</p>

        <div class="stats">
          <div class="stat">
            <span>Rank</span>
            <strong id="rank">GHOST</strong>
          </div>
          <div class="stat">
            <span>XP</span>
            <strong id="xp">0</strong>
          </div>
        </div>

        <h2 class="section-title">Operations</h2>
        <ul id="operation-list" class="operation-list"></ul>

        <button id="reset-btn" class="btn btn--ghost">Reset Progress</button>
      </aside>

      <section class="panel panel--center">
        <header class="mission-header">
          <p class="label" id="operation-label">Operation</p>
          <h2 id="objective-title">Waiting for sync...</h2>
          <p id="objective-narrative" class="narrative"></p>
        </header>

        <section class="editor-wrap">
          <label for="sql-input">SQL Input</label>
          <textarea
            id="sql-input"
            spellcheck="false"
            placeholder="SELECT * FROM ..."
          ></textarea>
        </section>

        <div class="actions">
          <button id="run-btn" class="btn btn--primary">Run Query</button>
          <button id="hint-btn" class="btn">Use Hint</button>
          <button id="schema-btn" class="btn">View Schema</button>
          <button id="advance-btn" class="btn btn--success">Advance</button>
        </div>

        <p id="status" class="status"></p>
      </section>

      <aside class="panel panel--right">
        <h2 class="section-title">Intel Feed</h2>
        <div id="hint-log" class="feed"></div>

        <h2 class="section-title">Result Grid</h2>
        <div id="result-wrap" class="result-wrap">
          <p class="muted">Run a query to inspect results.</p>
        </div>

        <h2 class="section-title">Schema</h2>
        <pre id="schema-view" class="schema-view">Schema hidden. Use "View Schema".</pre>
      </aside>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
